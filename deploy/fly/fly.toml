# ============================================================
# Fly.io Deployment
# fly launch → fly deploy
# ============================================================

app = "fitcoach-api"
primary_region = "fra"  # Frankfurt — nejblíž CZ

[build]
  dockerfile = "docker/Dockerfile"

[deploy]
  release_command = "npx prisma migrate deploy"
  strategy = "rolling"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

# Health check
[[services.http_checks]]
  interval = 15000
  timeout = 5000
  grace_period = "30s"
  method = "GET"
  path = "/health"

# Metriky
[metrics]
  port = 9091
  path = "/metrics"
